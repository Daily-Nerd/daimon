name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10 is the declared minimum (requires-python); 3.13 is latest stable.
        python-version: ["3.10", "3.13"]
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: plugin/uv.lock

      - name: Run tests
        # --extra pretty: the rich-path smoke tests in test_render.py import
        # rich unconditionally, and the --help formatter tests in test_cli.py
        # exercise rich-argparse the same way, so the suite requires both even
        # though runtime deps are stdlib-only.
        # HOME is redirected so any test that escapes the isolation fixtures
        # fails loudly instead of silently touching a real ~/.daimon.
        run: |
          mkdir -p "$RUNNER_TEMP/fake-home"
          HOME="$RUNNER_TEMP/fake-home" uv run --extra dev --extra pretty pytest -q --cov=daimon_briefing --cov-report=xml --junitxml=junit.xml

      - name: Upload test results to Codecov
        if: ${{ matrix.python-version == '3.13' && !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./plugin/junit.xml
          flags: py${{ matrix.python-version }}

      - name: Upload coverage to Codecov
        if: ${{ matrix.python-version == '3.13' && !cancelled() }}
        # Reporting only — no coverage threshold gates the build yet. The
        # upload no-ops gracefully when CODECOV_TOKEN is unset, so a missing
        # secret never turns CI red.
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Daily-Nerd/daimon
          files: ./plugin/coverage.xml
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: false

  lint:
    # Intended state: this job is a required status check in branch
    # protection (repo settings — maintainer action, not configurable here).
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: plugin/uv.lock

      # Blocking: ruff and mypy are version-pinned in the dev extra so the
      # gate is reproducible.
      # Same paths as .pre-commit-config.yaml — keep the two in sync so the
      # local hook and CI can never disagree about what is lint-clean.
      - name: ruff check
        run: uv run --extra dev ruff check daimon_briefing tests ../scripts

      # Non-blocking: mypy currently reports pre-existing errors that are a
      # deliberate follow-up. continue-on-error keeps them visible in the log
      # without blocking merges; tightened to blocking in a later slice.
      - name: mypy
        continue-on-error: true
        run: uv run --extra dev mypy daimon_briefing

  scar-lint:
    name: scar lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Dogfood: the repo's own scar graph must always parse and lint clean.
      # A malformed scar silently never fires — this gate makes that class
      # of rot unmergeable.
      - name: scar lint
        run: uvx --from scar-cli scar lint
